<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Meteo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
        }

        #container {
            background-color: white;
            padding: 30px;
            width: 300px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background-color: #4a90e2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #357ab8;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Informations de la meteo</h1>
        <input id="ville" type="text" placeholder="Entrez une ville">
        <button onclick="Execute()">voire la meteo</button>
    </div>
    <script src="TP2.js"></script>
</body>
</html>
